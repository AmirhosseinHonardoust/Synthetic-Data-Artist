name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint, format, and type checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy

      # The tree is clean, so Ruff, Black, and mypy are all enforced and will
      # fail the build on any new finding.
      - name: Ruff (lint)
        run: ruff check synthetic_data_artist tests

      - name: Black (format check)
        run: black --check synthetic_data_artist tests

      - name: mypy (type check)
        run: mypy synthetic_data_artist

  smoke-test:
    name: Smoke test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[vae]
          pip install coverage

      - name: Check source files compile
        run: |
          python -m compileall synthetic_data_artist tests

      - name: Run unit tests
        run: |
          coverage run -m unittest discover -s tests -v
          coverage report

      - name: Create small CI dataset and config
        run: |
          mkdir -p data

          python - <<'PY'
          import numpy as np
          import pandas as pd

          rng = np.random.default_rng(42)
          n = 80

          df = pd.DataFrame({
              "age": rng.normal(40, 10, n).round(2),
              "income": rng.normal(75000, 12000, n).round(2),
              "score": rng.normal(0, 1, n).round(4),
              "segment": rng.choice(["A", "B", "C"], size=n, p=[0.45, 0.35, 0.20]),
              "channel": rng.choice(["web", "store", "mobile"], size=n),
              "visits": rng.integers(1, 6, size=n),
              "purchased": rng.choice([0, 1], size=n, p=[0.6, 0.4]),
          })

          df.to_csv("data/ci_real_data.csv", index=False)
          PY

          cat > ci_config.yaml <<'YAML_CONFIG'
          rows: 40
          categorical_threshold: 10
          seed: 42
          pca_components: 2
          hist_bins: 10
          pairplot_sample: 30

          paths:
            data_dir: ci_data
            output_dir: ci_outputs
            report_dir: ci_reports

          plots:
            pairplot: false

          vae:
            epochs: 1
            batch_size: 16
            latent_dim: 2
            hidden_dim: 16
            learning_rate: 0.001
            kl_weight: 0.001

          evaluation:
            privacy_max_rows: 100
            ml_utility:
              target: purchased
              test_size: 0.25
          YAML_CONFIG

      - name: Validate config and input data only
        run: |
          synthetic-data-artist \
            --config ci_config.yaml \
            --data data/ci_real_data.csv \
            --method copula \
            --validate-only

      - name: Run Copula smoke workflow
        run: |
          synthetic-data-artist \
            --config ci_config.yaml \
            --data data/ci_real_data.csv \
            --method copula \
            --run_name ci_copula \
            --skip-pairplot

      - name: Run VAE smoke workflow
        run: |
          synthetic-data-artist \
            --config ci_config.yaml \
            --data data/ci_real_data.csv \
            --method vae \
            --run_name ci_vae \
            --skip-pairplot

      - name: Verify expected Copula outputs
        run: |
          test -f ci_data/synthetic_data_ci_copula.csv
          test -f ci_outputs/ci_copula/metrics.json
          test -f ci_outputs/ci_copula/quality_summary.csv
          test -f ci_outputs/ci_copula/plots/distribution_overlap.png
          test -f ci_outputs/ci_copula/plots/pca_projection.png
          test -f ci_outputs/ci_copula/plots/correlation_heatmap.png
          test ! -f ci_outputs/ci_copula/plots/pairplot_comparison.png
          test -f ci_reports/ci_copula_report.html

      - name: Verify expected VAE outputs
        run: |
          test -f ci_data/synthetic_data_ci_vae.csv
          test -f ci_outputs/ci_vae/metrics.json
          test -f ci_outputs/ci_vae/quality_summary.csv
          test -f ci_outputs/ci_vae/plots/distribution_overlap.png
          test -f ci_outputs/ci_vae/plots/pca_projection.png
          test -f ci_outputs/ci_vae/plots/correlation_heatmap.png
          test ! -f ci_outputs/ci_vae/plots/pairplot_comparison.png
          test -f ci_reports/ci_vae_report.html

      - name: Validate metrics JSON files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for path in [
              Path("ci_outputs/ci_copula/metrics.json"),
              Path("ci_outputs/ci_vae/metrics.json"),
          ]:
              data = json.loads(path.read_text())
              required_keys = [
                  "distribution_overlap_mean",
                  "correlation_diff_mean",
                  "categorical_similarity_mean",
                  "numeric_summary_diff_mean",
                  "boundary_violation_rate_mean",
                  "exact_duplicate_rate",
                  "nearest_neighbor_distance_mean",
                  "ml_utility_available",
                  "pairplot_enabled",
              ]

              missing = [key for key in required_keys if key not in data]
              if missing:
                  raise AssertionError(f"{path} is missing keys: {missing}")

              if data["pairplot_enabled"] is not False:
                  raise AssertionError(f"{path} should report pairplot_enabled=false")

              print(f"{path} OK")
          PY

      - name: Upload generated outputs
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-data-artist-outputs-python-${{ matrix.python-version }}
          path: |
            ci_data/synthetic_data_ci_copula.csv
            ci_data/synthetic_data_ci_vae.csv
            ci_outputs/ci_copula/
            ci_outputs/ci_vae/
            ci_reports/ci_copula_report.html
            ci_reports/ci_vae_report.html
