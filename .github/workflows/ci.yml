name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check source files compile
        run: |
          python -m compileall src

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -v

      - name: Run Copula smoke workflow
        run: |
          python src/main.py --method copula --run_name ci_copula

      - name: Verify expected outputs
        run: |
          test -f data/synthetic_data_ci_copula.csv
          test -f outputs/ci_copula/metrics.json
          test -f outputs/ci_copula/plots/distribution_overlap.png
          test -f outputs/ci_copula/plots/pca_projection.png
          test -f outputs/ci_copula/plots/correlation_heatmap.png
          test -f outputs/ci_copula/plots/pairplot_comparison.png
          test -f reports/ci_copula_report.html

      - name: Upload generated outputs
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-data-artist-outputs-python-${{ matrix.python-version }}
          path: |
            data/synthetic_data_ci_copula.csv
            outputs/ci_copula/
            reports/ci_copula_report.html
